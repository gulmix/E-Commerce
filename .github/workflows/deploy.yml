name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # IMAGE_PREFIX is constructed per-step using github.repository_owner

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push user-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: user-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ecommerce-user-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ecommerce-user-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push product-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: product-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ecommerce-product-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ecommerce-product-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push order-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: order-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ecommerce-order-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ecommerce-order-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api-gateway/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ecommerce-api-gateway:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ecommerce-api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        # Store your cluster's kubeconfig as a GitHub secret named KUBECONFIG
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy with Helm
        run: |
          helm upgrade --install ecommerce ./helm/ecommerce \
            --namespace ecommerce \
            --create-namespace \
            --set global.imageTag=${{ github.sha }} \
            --set global.imageRegistry=${{ env.REGISTRY }}/${{ github.repository_owner }} \
            --wait \
            --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/user-service    -n ecommerce --timeout=120s
          kubectl rollout status deployment/product-service -n ecommerce --timeout=120s
          kubectl rollout status deployment/order-service   -n ecommerce --timeout=120s
          kubectl rollout status deployment/api-gateway     -n ecommerce --timeout=120s
