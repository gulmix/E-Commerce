name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: golangci-lint (user-service)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: user-service
          args: --timeout=5m

      - name: golangci-lint (product-service)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: product-service
          args: --timeout=5m

      - name: golangci-lint (order-service)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: order-service
          args: --timeout=5m

      - name: golangci-lint (api-gateway)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: api-gateway
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test user-service
        working-directory: user-service
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Test product-service
        working-directory: product-service
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Test order-service
        working-directory: order-service
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Test api-gateway
        working-directory: api-gateway
        run: go test ./... -v -race -coverprofile=coverage.out

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build user-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: user-service/Dockerfile
          push: false
          tags: ecommerce-user-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build product-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: product-service/Dockerfile
          push: false
          tags: ecommerce-product-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build order-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: order-service/Dockerfile
          push: false
          tags: ecommerce-order-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build api-gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api-gateway/Dockerfile
          push: false
          tags: ecommerce-api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
