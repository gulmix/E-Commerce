---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-products-secret
  namespace: ecommerce
type: Opaque
stringData:
  POSTGRES_DB: "products_db"
  POSTGRES_USER: "products_user"
  POSTGRES_PASSWORD: "products_pass"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-products-pvc
  namespace: ecommerce
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-products
  namespace: ecommerce
  labels:
    app: postgres-products
spec:
  serviceName: postgres-products
  replicas: 1
  selector:
    matchLabels:
      app: postgres-products
  template:
    metadata:
      labels:
        app: postgres-products
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-products-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "products_user", "-d", "products_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-products-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-products
  namespace: ecommerce
  labels:
    app: postgres-products
spec:
  selector:
    app: postgres-products
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
