---
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: ecommerce
data:
  GRPC_PORT: ":50051"
  METRICS_PORT: ":9091"
  LOG_LEVEL: "info"
  JWT_ACCESS_EXPIRY_MIN: "15"
  JWT_REFRESH_EXPIRY_HOURS: "168"
  OTEL_ENDPOINT: "jaeger:4317"

---
apiVersion: v1
kind: Secret
metadata:
  name: user-service-secret
  namespace: ecommerce
type: Opaque
stringData:
  DB_DSN: "postgres://users_user:users_pass@postgres-users:5432/users_db?sslmode=disable"
  JWT_SECRET: "change-me-to-a-secure-random-secret"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ecommerce
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: ghcr.io/OWNER/ecommerce-user-service:latest
          ports:
            - name: grpc
              containerPort: 50051
            - name: metrics
              containerPort: 9091
          envFrom:
            - configMapRef:
                name: user-service-config
            - secretRef:
                name: user-service-secret
          readinessProbe:
            httpGet:
              path: /ready
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 9091
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: ecommerce
  labels:
    app: user-service
spec:
  selector:
    app: user-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: metrics
      port: 9091
      targetPort: 9091
