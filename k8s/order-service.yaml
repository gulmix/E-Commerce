---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: ecommerce
data:
  GRPC_PORT: ":50053"
  METRICS_PORT: ":9093"
  LOG_LEVEL: "info"
  USER_SERVICE_ADDR: "user-service:50051"
  PRODUCT_SERVICE_ADDR: "product-service:50052"
  OTEL_ENDPOINT: "jaeger:4317"

---
apiVersion: v1
kind: Secret
metadata:
  name: order-service-secret
  namespace: ecommerce
type: Opaque
stringData:
  DB_DSN: "postgres://orders_user:orders_pass@postgres-orders:5432/orders_db?sslmode=disable"
  RABBITMQ_URL: "amqp://rabbit:rabbit_pass@rabbitmq:5672/"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: ghcr.io/OWNER/ecommerce-order-service:latest
          ports:
            - name: grpc
              containerPort: 50053
            - name: metrics
              containerPort: 9093
          envFrom:
            - configMapRef:
                name: order-service-config
            - secretRef:
                name: order-service-secret
          readinessProbe:
            httpGet:
              path: /ready
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 9093
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: ecommerce
  labels:
    app: order-service
spec:
  selector:
    app: order-service
  ports:
    - name: grpc
      port: 50053
      targetPort: 50053
    - name: metrics
      port: 9093
      targetPort: 9093

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-service-hpa
  namespace: ecommerce
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
