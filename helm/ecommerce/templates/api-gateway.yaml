---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: {{ .Values.global.namespace }}
  labels:
    app: api-gateway
    {{- include "ecommerce.labels" . | nindent 4 }}
data:
  HTTP_PORT: ":{{ .Values.apiGateway.httpPort }}"
  USER_SERVICE_ADDR: {{ .Values.apiGateway.config.userServiceAddr | quote }}
  PRODUCT_SERVICE_ADDR: {{ .Values.apiGateway.config.productServiceAddr | quote }}
  ORDER_SERVICE_ADDR: {{ .Values.apiGateway.config.orderServiceAddr | quote }}
  LOG_LEVEL: {{ .Values.apiGateway.config.logLevel | quote }}
  RATE_LIMIT_RPM: {{ .Values.apiGateway.config.rateLimitRpm | quote }}
  OTEL_ENDPOINT: {{ .Values.apiGateway.config.otelEndpoint | quote }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    app: api-gateway
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.apiGateway.replicas }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: {{ include "ecommerce.image" (dict "registry" .Values.global.imageRegistry "image" .Values.apiGateway.image "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.apiGateway.httpPort }}
          envFrom:
            - configMapRef:
                name: api-gateway-config
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.apiGateway.httpPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.apiGateway.httpPort }}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    app: api-gateway
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.apiGateway.httpPort }}
