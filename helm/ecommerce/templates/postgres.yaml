{{/* ── Users DB ── */}}
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-users-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    app: postgres-users
    {{- include "ecommerce.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgresUsers.secrets.postgresDb | quote }}
  POSTGRES_USER: {{ .Values.postgresUsers.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresUsers.secrets.postgresPassword | quote }}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-users-pvc
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgresUsers.storage }}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-users
  namespace: {{ .Values.global.namespace }}
  labels:
    app: postgres-users
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  serviceName: postgres-users
  replicas: 1
  selector:
    matchLabels:
      app: postgres-users
  template:
    metadata:
      labels:
        app: postgres-users
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgresUsers.image }}
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-users-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresUsers.secrets.postgresUser | quote }}, "-d", {{ .Values.postgresUsers.secrets.postgresDb | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.postgresUsers.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-users-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-users
  namespace: {{ .Values.global.namespace }}
  labels:
    app: postgres-users
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  selector:
    app: postgres-users
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None

